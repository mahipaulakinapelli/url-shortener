spring:
  application:
    name: url-shortener

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urlshortener}
    username: ${DB_USERNAME:mahipaul}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:MyNewStr0ngPass!1}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 1000ms

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json

app:
  base-url: ${BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItdXJsLXNob3J0ZW5lci1wcm9kdWN0aW9u}
    access-token-expiration: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800000}
  cache:
    url-ttl: ${CACHE_URL_TTL:3600}
  cleanup:
    cron: ${CLEANUP_CRON:0 0 * * * *}
  rate-limit:
    max-requests-per-user: ${RATE_LIMIT_USER:60}
    max-requests-per-ip: ${RATE_LIMIT_IP:30}
    window-seconds: ${RATE_LIMIT_WINDOW:60}

logging:
  level:
    com.urlshortener: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
